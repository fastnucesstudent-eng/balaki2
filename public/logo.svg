<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="32" fill="#060907"/>
  
  <g transform="translate(256,200)">
    <!-- Top Leaf Cluster -->
    <g transform="translate(0, -75)">
      <path d="M 0,-35 C -25,-60 -45,-30 -20,-10 C -5,-2 0,0 0,0 C 0,0 5,-2 20,-10 C 45,-30 25,-60 0,-35 Z" fill="#22c55e"/>
      <path d="M -30,-15 C -55,-35 -65,-5 -40,10 C -25,15 -10,5 -10,5 C -10,5 -20,-10 -30,-15 Z" fill="#16a34a"/>
      <path d="M 30,-15 C 55,-35 65,-5 40,10 C 25,15 10,5 10,5 C 10,5 20,-10 30,-15 Z" fill="#16a34a"/>
    </g>
    
    <!-- Bottom Leaf Cluster -->
    <g transform="translate(0, 75) rotate(180)">
      <path d="M 0,-35 C -25,-60 -45,-30 -20,-10 C -5,-2 0,0 0,0 C 0,0 5,-2 20,-10 C 45,-30 25,-60 0,-35 Z" fill="#22c55e"/>
      <path d="M -30,-15 C -55,-35 -65,-5 -40,10 C -25,15 -10,5 -10,5 C -10,5 -20,-10 -30,-15 Z" fill="#16a34a"/>
      <path d="M 30,-15 C 55,-35 65,-5 40,10 C 25,15 10,5 10,5 C 10,5 20,-10 30,-15 Z" fill="#16a34a"/>
    </g>
    
    <!-- Left Leaf Cluster -->
    <g transform="translate(-75, 0) rotate(-90)">
      <path d="M 0,-35 C -25,-60 -45,-30 -20,-10 C -5,-2 0,0 0,0 C 0,0 5,-2 20,-10 C 45,-30 25,-60 0,-35 Z" fill="#22c55e"/>
      <path d="M -30,-15 C -55,-35 -65,-5 -40,10 C -25,15 -10,5 -10,5 C -10,5 -20,-10 -30,-15 Z" fill="#16a34a"/>
      <path d="M 30,-15 C 55,-35 65,-5 40,10 C 25,15 10,5 10,5 C 10,5 20,-10 30,-15 Z" fill="#16a34a"/>
    </g>
    
    <!-- Right Leaf Cluster -->
    <g transform="translate(75, 0) rotate(90)">
      <path d="M 0,-35 C -25,-60 -45,-30 -20,-10 C -5,-2 0,0 0,0 C 0,0 5,-2 20,-10 C 45,-30 25,-60 0,-35 Z" fill="#22c55e"/>
      <path d="M -30,-15 C -55,-35 -65,-5 -40,10 C -25,15 -10,5 -10,5 C -10,5 -20,-10 -30,-15 Z" fill="#16a34a"/>
      <path d="M 30,-15 C 55,-35 65,-5 40,10 C 25,15 10,5 10,5 C 10,5 20,-10 30,-15 Z" fill="#16a34a"/>
    </g>

    <!-- Center 'B' Emblem -->
    <text x="0" y="22" font-family="'Times New Roman', Times, Georgia, serif" font-size="72" font-weight="900" text-anchor="middle" fill="#22c55e">B</text>
  </g>
  
  <!-- Text: BALAKI -->
  <text x="256" y="380" font-family="'Times New Roman', Times, Georgia, serif" font-size="42" font-weight="900" letter-spacing="14" text-anchor="middle" fill="#22c55e">BALAKI</text>
  
  <!-- Text: ORGANIC -->
  <text x="256" y="430" font-family="'Montserrat', 'Arial', sans-serif" font-size="28" font-weight="700" letter-spacing="18" text-anchor="middle" fill="#16a34a">ORGANIC</text>
</svg>
