name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java SDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install Frontend Dependencies
        run: npm install --legacy-peer-deps

      - name: Generate Environment File
        run: |
          echo "VITE_SITE_URL=https://tarzify.com" > .env
          echo "VITE_SUPABASE_URL=https://cujqttdzkyspeotgrrdx.supabase.co" >> .env
          echo "VITE_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN1anF0dGR6a3lzcGVvdGdycmR4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAzOTAyNTksImV4cCI6MjA4NTk2NjI1OX0.43Gq0X9eyRa5HAGhaH-Yt8p8ZTnOhK9TQ5ZhpLzKSIQ" >> .env
          echo "VITE_API_URL=https://backend.tarzify.com/api" >> .env
          echo "VITE_CLOUDINARY_CLOUD_NAME=dtaonueid" >> .env
          echo "VITE_CLOUDINARY_UPLOAD_PRESET=ml_default" >> .env

      - name: Build Web Application
        run: npm run build

      - name: Sync Capacitor Android Project
        run: npx cap sync android

      - name: Build Android APK (Debug)
        working-directory: android
        run: chmod +x ./gradlew && ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tarzify-android-app
          path: android/app/build/outputs/apk/debug/app-debug.apk
